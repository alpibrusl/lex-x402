name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lex toolchain
        run: |
          git clone --depth=1 https://github.com/alpibrusl/lex-lang /tmp/lex-lang
          cd /tmp/lex-lang && cargo build --release -p lex-cli
          echo "/tmp/lex-lang/target/release" >> $GITHUB_PATH

      - name: Install package dependencies
        run: lex pkg install

      - name: Type-check (strict)
        run: |
          lex check --strict src/client.lex
          lex check --strict src/facilitator.lex
          lex check --strict src/server.lex

      - name: Format check
        run: lex fmt --check src/ tests/

      - name: Test
        run: lex test
